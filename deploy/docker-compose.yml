services:
  fastpospal:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8000"
      FASTMCP_STATELESS_HTTP: "true"
      # MCP_AUTH_TOKEN: "change-me-in-production"
    restart: unless-stopped
    # 实测空闲 ~120–180MB，256MB 足够；禁止 swap 防止 silently 涨内存
    mem_limit: 256m
    memswap_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
