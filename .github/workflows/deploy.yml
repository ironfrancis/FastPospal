name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  IMAGE: fastpospal:latest
  DEPLOY_HOST: 1.117.73.236
  DEPLOY_USER: root
  REMOTE_DIR: /opt/FastPospal

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Static check
        run: uv run python -m compileall fastpospal server.py app.py

      - name: Build Docker image
        run: docker build --platform linux/amd64 -f deploy/Dockerfile -t ${{ env.IMAGE }} .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ env.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload image to server
        run: |
          docker save "${{ env.IMAGE }}" | gzip -1 | \
            ssh "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}" 'gunzip | docker load'

      - name: Sync deploy files
        run: |
          tar czf - \
            --exclude='.env' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='.git' \
            --exclude='._*' \
            -C . . | \
            ssh "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}" \
              "mkdir -p ${{ env.REMOTE_DIR }} && tar xzf - -C ${{ env.REMOTE_DIR }}"

      - name: Restart container
        run: |
          ssh "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}" \
            "cd ${{ env.REMOTE_DIR }} && docker compose -f deploy/docker-compose.prod.yml up -d"

      - name: Smoke test
        run: |
          ssh "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}" \
            "docker exec fastpospal uv run python -c 'import fastpospal; print(\"ok\")'"
