name: 功能建议
description: 新 MCP 工具、SDK 能力或文档改进
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        描述你希望添加的能力或使用场景。若官方开放平台已有等价接口，请说明为何仍需 Web API 封装。

  - type: textarea
    id: problem
    attributes:
      label: 问题或场景
      description: 你想解决什么问题？谁在什么场景下需要？
      placeholder: 希望通过 MCP 批量查询多个门店的库存快照，用于每日对账
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 期望的 SDK 方法名、MCP 工具名、参数与返回结构
      placeholder: |
        pospal_batch_stock_snapshot(store_ids: list[str]) -> list[dict]
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 是否考虑过官方 Open API、手动操作或其他集成方式？
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: 贡献意愿
      options:
        - label: 我愿意提交 Pull Request 实现此功能
          required: false
